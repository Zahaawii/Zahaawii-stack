services:
  blog-frontend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-blog-frontend:prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8070:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  blog-db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${BLOG_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BLOG_DB_NAME}
      MYSQL_USER: ${BLOG_DB_USER}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      TZ: ${TZ:-Europe/Copenhagen}
    volumes:
      - blog_db_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  blog-backend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-blog-backend:prod
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      blog-db:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://blog-db:3306/${BLOG_DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${BLOG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BLOG_DB_PASSWORD}
      JWT_TOKEN: ${BLOG_JWT_TOKEN}
      FILE_UPLOAD_DIR: /data/uploads/images
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-https://zaak.dk,https://www.zaak.dk}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - blog_uploads_prod:/data/uploads/images
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/status/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-server:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-mcp-server:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8282"
      SPRING_PROFILES_ACTIVE: prod
      BLOG_API_BASE_URL: ${BLOG_API_BASE_URL:-https://zaak.dk/api}
      CHROMADB_API_KEY: ${CHROMADB_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8282:8282"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8282/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  personal-chatbot:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-personal-chatbot:prod
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8181"
      MCP_BASE_URL: http://mcp-server:8282
      CHROMADB_API_KEY: ${CHROMADB_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8181/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  blog_db_data_prod:
  blog_uploads_prod:
