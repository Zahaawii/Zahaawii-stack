services:
  blog-db:
    image: mysql:8.0
    env_file:
      - .env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${BLOG_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BLOG_DB_NAME}
      MYSQL_USER: ${BLOG_DB_USER}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - blog_db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  blog-backend:
    build:
      context: ../../apps/ZahaawiisBlog
    env_file:
      - .env.dev
    depends_on:
      blog-db:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://blog-db:3306/${BLOG_DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${BLOG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BLOG_DB_PASSWORD}
      JWT_TOKEN: ${BLOG_JWT_TOKEN}
      FILE_UPLOAD_DIR: /data/uploads/images
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088,http://127.0.0.1:8080,http://localhost:8080}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - blog_uploads_dev:/data/uploads/images
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/status/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-server:
    build:
      context: ../../apps/MCPDatabaseServer
    env_file:
      - .env.dev
    depends_on:
      blog-backend:
        condition: service_healthy
    environment:
      SERVER_PORT: "8282"
      SPRING_PROFILES_ACTIVE: dev
      BLOG_API_BASE_URL: ${BLOG_API_BASE_URL:-http://blog-backend:8080/api}
      CHROMADB_API_KEY: ${CHROMADB_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8282:8282"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8282/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  personal-chatbot:
    build:
      context: ../../apps/personalChatBotJS
    env_file:
      - .env.dev
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "8181"
      MCP_BASE_URL: http://mcp-server:8282
      CHROMADB_API_KEY: ${CHROMADB_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      TZ: ${TZ:-Europe/Copenhagen}
    ports:
      - "127.0.0.1:8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8181/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  blog-frontend:
    image: httpd:2.4-alpine
    depends_on:
      blog-backend:
        condition: service_healthy
      personal-chatbot:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    command: >
      sh -c "
      sed -i 's/^Listen 80$/Listen 8081/' /usr/local/apache2/conf/httpd.conf &&
      sed -i 's/^#LoadModule proxy_module modules\\/mod_proxy.so/LoadModule proxy_module modules\\/mod_proxy.so/' /usr/local/apache2/conf/httpd.conf &&
      sed -i 's/^#LoadModule proxy_http_module modules\\/mod_proxy_http.so/LoadModule proxy_http_module modules\\/mod_proxy_http.so/' /usr/local/apache2/conf/httpd.conf &&
      sed -i 's/^#LoadModule proxy_wstunnel_module modules\\/mod_proxy_wstunnel.so/LoadModule proxy_wstunnel_module modules\\/mod_proxy_wstunnel.so/' /usr/local/apache2/conf/httpd.conf &&
      sed -i 's/^#LoadModule rewrite_module modules\\/mod_rewrite.so/LoadModule rewrite_module modules\\/mod_rewrite.so/' /usr/local/apache2/conf/httpd.conf &&
      printf '\\nInclude /usr/local/apache2/conf/extra/dev-proxy.conf\\n' >> /usr/local/apache2/conf/httpd.conf &&
      httpd-foreground"
    volumes:
      - ../../apps/frontend:/usr/local/apache2/htdocs:ro
      - ./httpd-dev-proxy.conf:/usr/local/apache2/conf/extra/dev-proxy.conf:ro
    ports:
      - "127.0.0.1:8088:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  blog_db_data_dev:
  blog_uploads_dev:
