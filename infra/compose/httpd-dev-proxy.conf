ServerName localhost
ProxyPreserveHost On

# Blog backend APIs
ProxyPass /api/ http://blog-backend:8080/api/
ProxyPassReverse /api/ http://blog-backend:8080/api/

# PersonalChatbotJS backend
ProxyPass /node/ http://personal-chatbot:8181/
ProxyPassReverse /node/ http://personal-chatbot:8181/

# MCP endpoint
ProxyPass /mcp/ http://mcp-server:8282/mcp/
ProxyPassReverse /mcp/ http://mcp-server:8282/mcp/

# SockJS/WebSocket chat endpoint
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule ^/ws/(.*) ws://blog-backend:8080/ws/$1 [P,L]
ProxyPass /ws/ http://blog-backend:8080/ws/
ProxyPassReverse /ws/ http://blog-backend:8080/ws/
