services:
  db:
    image: mysql:8.0
    container_name: zhb-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${BLOG_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BLOG_DB_NAME}
      MYSQL_USER: ${BLOG_DB_USER}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      TZ: Europe/Copenhagen
    volumes:
      - dbdata:/var/lib/mysql
    # Valgfrit at eksponere til værten
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  app:
    build: .
    container_name: zhb-app
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${BLOG_DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&connectTimeout=30000&socketTimeout=30000
      SPRING_DATASOURCE_USERNAME: ${BLOG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BLOG_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_TOKEN: ${JWT_TOKEN}
      FILE_UPLOAD_DIR: /data/uploads/images
      TZ: Europe/Copenhagen
      # (valgfrit) Lad Spring ikke fejle hårdt på første forsøg:
      # SPRING_SQL_INIT_MODE: never
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/data/uploads/images
    restart: unless-stopped

volumes:
  dbdata:
  uploads:
