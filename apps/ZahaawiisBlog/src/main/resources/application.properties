spring.application.name=ZahaawiiBlog

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Zahaawiiblog?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.messaging=TRACE
logging.level.org.springframework.web.socket=TRACE
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
app.jwt.secret=${JWT_TOKEN}
file.upload-dir=${FILE_UPLOAD_DIR:/data/uploads/images}
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}







